# Journal Extension Experiment Configuration
# IEEE Transactions on Smart Grid submission
# Addresses: Q2.1, Q2.7 (IEEE 118), Q2.2 (multi-seed)

# =============================================================================
# Data Settings (Extended for journal)
# =============================================================================
data:
  ieee_cases: [14, 30, 39, 57, 118]  # Full IEEE progression
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  num_scenarios: 1000
  seed: 42

  # Synthetic large-scale grids (V2 scalability, reproducible from seed)
  synthetic_grids:
    large:
      n_buses: 10000
      n_zones: 20
      seed: 42
    xlarge:
      n_buses: 20000
      n_zones: 40
      seed: 42

  # Per-case training epochs (larger cases need more)
  epochs_per_case:
    14: 200
    30: 200
    39: 300
    57: 300
    118: 500
    10000: 800
    20000: 1000

# Communication delay settings
delays:
  distribution: "lognormal"
  mean_ms: 50
  std_ms: 20
  min_ms: 5
  max_ms: 500

# =============================================================================
# Statistical Framework (V2, Q2.2)
# =============================================================================
statistics:
  num_seeds: 5
  seed_multiplier: 42  # seed_i = i * seed_multiplier
  confidence_level: 0.95
  test_method: "wilcoxon"  # wilcoxon, ttest
  correction: "holm_sidak"

# =============================================================================
# Model Architecture (V2 defaults)
# =============================================================================
model:
  embed_dim: 128
  hidden_dim: 256
  gnn_layers: 3
  gnn_type: "GAT"
  num_heads: 8
  attention_dropout: 0.1
  use_causal_mask: true
  use_physics_mask: true

  # V2: Adaptive gamma (Q3.3)
  physics_mask_gamma: 0.1
  adaptive_gamma: true

  energy_input_dim: 5
  comm_input_dim: 3
  decoder_layers: 2

# =============================================================================
# Loss Function Weights
# =============================================================================
loss:
  cost_weight: 1.0
  voltage_weight: 10.0
  frequency_weight: 100.0
  latency_weight: 1.0
  bandwidth_penalty: 10.0
  alpha: 1.0
  beta: 0.1
  rho_min: 0.01
  contrastive_weight: 0.1
  temperature: 0.07

# =============================================================================
# Training Settings
# =============================================================================
training:
  epochs: 300  # Default; overridden by epochs_per_case
  batch_size: 32
  learning_rate: 1e-4
  weight_decay: 1e-5
  scheduler: "cosine"
  warmup_epochs: 10
  min_lr: 1e-6
  optimizer: "adamw"
  gradient_clip: 1.0
  patience: 50
  min_delta: 1e-4
  save_every: 50
  keep_last_k: 3

# =============================================================================
# Stability Computation
# =============================================================================
stability:
  k_init_scale: "auto"  # auto = safety_factor * |lambda_min| / n_gen
  tau_max_method: "crossover"
  tau_max_fixed_ms: 500
  eigenvalue_method: "scipy"

# =============================================================================
# Baselines to include
# =============================================================================
baselines:
  models:
    - "JointOptimizer"
    - "B1_SequentialOPFQoS"
    - "B2_MLPJoint"
    - "B3_GNNOnly"
    - "B4_LSTMJoint"
    - "B5_CNNJoint"
    - "B6_VanillaTransformer"
    - "B7_TransformerNoCoupling"
    # V2 new baselines (Batch 4)
    - "B8_HeterogeneousGNN"
    - "B9_DeepOPF"

  # Hyperparameter tuning for fair comparison (Q2.6)
  tune_baselines: false  # Set to true for full HP search

# =============================================================================
# Hardware
# =============================================================================
hardware:
  device: "cuda"
  num_workers: 4
  pin_memory: true
  mixed_precision: true

reproducibility:
  seed: 42
  deterministic: true
